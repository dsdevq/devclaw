# State-currency audit config.
#
# Scope = canonical state docs only. NEVER scan history (journals, tasks,
# proposals, recon) — those are immutable records of "what was true then."
#
# retired_terms = strings that should no longer appear in any in-scope doc.
# expected_live = ground-truth checks (containers, files) that must be present.

scope:
  include:
    - PLAN.md
    - domains/*.md
    - system/architecture.md
    - system/gaps.md
    - system/adapters.md
    - system/lifekit-stack-execution-plan.md
    - routines/workflows.yaml

retired_terms:
  - term: swarm
    retired_on: 2026-05-18
    reason: Subsumed by devclaw orchestrator's code_task runner
    replacement: devclaw orchestrator

  - term: dev-agent
    retired_on: 2026-05-14
    reason: Conversational role moved to OpenClaw; build role to devclaw
    replacement: OpenClaw gateway / devclaw orchestrator

  - term: ClaudeAgentSdkBuildEngine
    retired_on: 2026-05-18
    reason: BuildEngine port superseded by TaskOrchestrator (devclaw)

  - term: CodexCliBuildEngine
    retired_on: 2026-05-18
    reason: Migration target irrelevant once BuildEngine port retired

  - term: swarm-langgraph.service
    retired_on: 2026-05-18
    reason: Systemd unit removed

expected_live:
  # docker_containers check is intentionally omitted — the orchestrator container
  # has no docker socket, so it can't observe peer containers. Container health
  # belongs in an OpenClaw-side or host-side healthcheck, not here.
  files:
    - PLAN.md
    - system/architecture.md
