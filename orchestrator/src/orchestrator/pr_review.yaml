# pr_review_loop configuration.
#
# Drives autonomous PR review + merge for devclaw-authored PRs. The loop only
# acts on PRs whose head branch matches `kit/<task_id>` AND have a matching
# spec.yaml under ~/.life/.
#
# Atomic PRs only. Contract-class PRs (image, deploy, secrets) are surfaced
# for human review regardless of verdict.

# watched_authors: GitHub usernames whose PRs are eligible for cognitive
# review. An empty list or ["*"] means filter only by branch prefix `kit/`.
# Keep empty by default — the branch-prefix + on-disk-spec gate is already
# tight, and the kit runner's commit author identity drifts across deploys.
watched_authors: []

# Per-tick PR review cap. Cognition is the expensive step; we don't want one
# tick chewing through a backlog and exhausting Claude OAuth quota.
review_cap_per_tick: 3

# CI checks that are known to fail for reasons unrelated to the PR diff.
# A failing check whose name+text matches an entry here is treated as success.
# An empty failure_substring matches any failure on that check_name.
known_ci_noise:
  - check_name: "Lint (markdown + secrets)"
    failure_substring: ""  # gitleaks-action fails on every recent PR

# Heuristic: any diff that touches a contract path is contract-class even if
# the spec declares atomic. Defense in depth — a misclassified spec must not
# slip a Dockerfile change past the loop.
contract_class_heuristics:
  contract_paths:
    - "Dockerfile"
    - "Dockerfile.*"
    - "compose/**"
    - "docker-compose*.yml"
    - "scripts/deploy*"
    - ".env*"
    - "**/secrets/**"
    - ".github/workflows/**"
    - "infra/**"
    - "terraform/**"

# Optional override: explicit list of repos to watch. If unset, the loop
# discovers repos from projects/*/settings.yaml's github_repo field.
# repos:
#   - dsdevq/devclaw
