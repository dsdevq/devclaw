<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>devclaw console</title>
    <!-- Fonts are self-hosted via @font-face in src/index.css — no CDN. -->
    <style>
      /* Pre-paint background so the first frame isn't a white flash before the
         CSS-variable theme loads. index.css owns everything after mount. */
      html {
        background: #0b0c0f;
      }
      html[data-theme="light"] {
        background: #fbfbfc;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
