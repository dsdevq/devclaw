id: blocked_planner
description: >
  The goal planner returns `decision=blocked` with a clarifying question. The
  chef must pin phase=blocked + blocked_on, ping the owner once, and NOT
  dispatch any action. A blocked goal subsequently stays idle on cadence (the
  zero-token guardrail) until steering arrives — but this scenario only checks
  the FIRST tick that flips it to blocked.

mode: goal

cognition:
  stub_responses:
    evaluator: |
      ## Current state
      Repo has minimal scaffolding.
      ## Gap to good
      The done_when is ambiguous; can't move yet.
      ## What good looks like
      - Clear requirements
    goal_planner: |
      {"decision": "blocked", "note": "ambiguous DB choice",
       "question": "Which database should we use — Postgres or SQLite?"}

setup:
  goal:
    objective: Add persistence to the example service.
    done_when: Data is persisted.
    backlog:
      - Add persistence.
    cadence: 1d
    open_pr: false

ticks: 3

expect:
  final_phase: blocked
  final_lifecycle: executing
  blocked_on_contains: "Which database"
  outcomes_contain: [blocked]
  cognition_by_role_min:
    goal_planner: 1
  counts_eq:
    deliveries: 0
  notify_owner_contains:
    - "needs you"
    - "Which database"
