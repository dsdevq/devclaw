name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (markdown + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs history

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GH Actions Artifact storage is quota-blocked by the account-lock;
          # the SARIF upload fails and reds the job even with zero leaks.
          # gitleaks's own exit code is the gate, so disable the upload.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: yamllint
        run: |
          pipx install yamllint
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' \
            .github/workflows/ examples/ 2>&1 || true
