name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install -e '.[dev]'
      - name: pytest
        run: python -m pytest -q

  lint:
    name: Lint (markdown + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The gitleaks-action requires a license for non-OSS use and reds the job
      # on the account-lock's artifact-quota block — so run the pinned binary
      # directly. Its exit code is the gate; scans the working tree for secrets.
      - name: gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --no-banner --redact --exit-code 1

      - name: yamllint
        run: |
          pipx install yamllint
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' \
            .github/workflows/ 2>&1 || true

  deploy:
    name: Deploy to lifekit-vps
    needs: test
    # Only ship a green main. workflow_dispatch gives a manual "redeploy main"
    # button. PRs never reach the self-hosted runner (test/lint run hosted).
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    concurrency:
      group: deploy-lifekit-vps
      cancel-in-progress: false
    steps:
      # No checkout: the runner (user `lifekit`) drives the existing on-box
      # deploy surface, which git-clones devclaw@main itself at image-build time.
      - name: deploy.sh (rebuild devclaw@main --no-cache, recreate, verify)
        run: |
          cd /srv/lifekit-stack
          DEVCLAW_REF=main bash scripts/deploy.sh
